<div class="page-shell">
    <div class="hero-card">

        <header class="topbar">
            <div class="brand">Exploratour</div>

            <nav class="nav-links">
                <a href="../index.html">Home</a>
                <a href="destinations.html">Destinations</a>

        <main class="hero-content">

            <div class="content-card">

                <h1>Contact</h1>

                <p>
                    If something feels confusing or you just need help figuring out where to start,
                    you can reach out here. Even if it’s just a quick question, it’s better than guessing.
                </p>

                <form action="success.html">

                    <label>Name</label>
                    <input type="text" placeholder="Your name" required>

                    <label>Email</label>
                    <input type="email" placeholder="Your email" required>

                    <label>Message</label>
                    <input type="text" placeholder="What do you need help with?" required>

                    <button type="submit" class="submit-button">Send Message</button>

                </form>

            </div>

        </main>

    </div>
