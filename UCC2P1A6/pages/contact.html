<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Exploratour</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/script.js" defer></script>
</head>

<body>
    <div class="page-shell">
        <div class="site-card">

            <!-- HEADER -->
            <header class="topbar">
                <div class="brand">
                    <span class="brand-mark">✦</span>
                    <span class="brand-text">Exploratour</span>
                </div>

                <div class="topbar-right">
                    <a href="../index.html" class="text-link">Home</a>
                    <a href="destinations.html" class="text-link">Destinations</a>
                    <a href="login.html" class="button-light">Login</a>
                </div>
            </header>

            <!-- PAGE CONTENT -->
            <main style="padding:120px 30px 60px; display:flex; justify-content:center;">

                <div class="form-card">
                    <h1 class="page-title">Contact</h1>

                    <p class="page-copy">
                        If something feels confusing or you just need help figuring out where to start,
                        you can reach out here. Even if it’s just a quick question, it’s better than guessing.
                    </p>

                    <form id="contactForm" action="success.html" onsubmit="return validateContactForm()">

                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Your name">
                        <small class="error" id="nameError"></small>

                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Your email">
                        <small class="error" id="emailError"></small>

                        <label for="topic">What do you need help with?</label>
                        <select id="topic" name="topic">
                            <option value="">Select an option</option>
                            <option value="booking">Booking</option>
                            <option value="destinations">Destinations</option>
                            <option value="flights">Flights</option>
                            <option value="hotels">Hotels</option>
                            <option value="other">Other</option>
                        </select>
                        <small class="error" id="topicError"></small>

                        <label for="message">Message</label>
                        <textarea id="message" name="message" placeholder="What do you need help with?"
                            maxlength="200"></textarea>
                        <div id="charCount">0 / 200</div>
                        <small class="error" id="messageError"></small>

                        <button type="submit" class="submit-button">Send Message</button>

                    </form>
                </div>

            </main>

        </div>
    </div>
</body>

</html>
