<div class="page-shell">

        <header class="topbar">
            <div class="brand">Exploratour</div>

            <nav class="nav-links">
                <a href="../index.html">Home</a>

            <div class="content-card">

                <h1>Flights</h1>

                <p>
                    This is where the trip starts to feel real. You can look into routes, timing, and options that actually fit your plans instead of guessing.
                </p>

                <form>

                    <label>Departure City</label>
                    <input type="text" placeholder="Where are you leaving from?" required>

                    <label>Destination</label>
                    <input type="text" placeholder="Where are you going?" required>

                    <label>Departure Date</label>
                    <input type="date" required>

                    <label>Return Date</label>
                    <input type="date">

                    <label>Passengers</label>
                    <input type="number" min="1" value="1" required>

                    <button type="submit" class="submit-button">Search Flights</button>

                </form>

            </div>

        </main>

    </div>
