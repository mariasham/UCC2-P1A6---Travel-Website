<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flights | Exploratour</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <div class="page-shell">
    <div class="site-card">

      <!-- HEADER -->
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">✦</span>
          <span class="brand-text">Exploratour</span>
        </div>

        <div class="topbar-right">
          <a href="../index.html" class="text-link">Home</a>
          <a href="destinations.html" class="text-link">Destinations</a>
          <a href="login.html" class="button-light">Login</a>
        </div>
      </header>

      <!-- PAGE CONTENT -->
      <main style="padding:120px 30px 60px; display:flex; justify-content:center;">

        <div class="form-card">

          <h1 class="page-title">Flights</h1>

          <p class="page-copy">
            This is where the trip starts to feel real. You’re not guessing anymore — you’re choosing what actually works for you.
          </p>

          <form>

            <label for="from">Departure City</label>
            <input id="from" type="text" placeholder="Where are you leaving from?" required>

            <label for="to">Destination</label>
            <input id="to" type="text" placeholder="Where are you going?" required>

            <label for="depart">Departure Date</label>
            <input id="depart" type="date" required>

            <label for="return">Return Date</label>
            <input id="return" type="date">

            <label for="passengers">Passengers</label>
            <input id="passengers" type="number" min="1" value="1" required>

            <button type="submit" class="submit-button">
              Search Flights
            </button>

          </form>

          <p style="margin-top:15px; font-size:0.9rem; color:#5e646b;">
            *This is a demo search. Results are not live.
          </p>

        </div>

      </main>

    </div>
  </div>
</body>
</html>
