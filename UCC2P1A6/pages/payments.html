<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payments | Exploratour</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <div class="page-shell">
    <div class="site-card">

      <!-- HEADER -->
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">✦</span>
          <span class="brand-text">Exploratour</span>
        </div>
        <div class="topbar-right">
          <a href="../index.html" class="text-link">Home</a>
          <a href="destinations.html" class="text-link">Destinations</a>
          <a href="login.html" class="button-light">Login</a>
        </div>
      </header>

      <!-- PAGE CONTENT -->
      <main style="padding:120px 30px 60px; display:flex; justify-content:center;">

        <div class="form-card">

          <h1 class="page-title">Payments</h1>

          <p class="page-copy">
            This is where everything becomes real. Once you confirm here, your plans move from ideas into something set.
          </p>

          <!-- FORM -->
          <form action="success.html">

            <label>Full Name</label>
            <input type="text" placeholder="Name on card" required>

            <label>Card Number</label>
            <input type="text" placeholder="1234 5678 9012 3456" required>

            <label>Expiration Date</label>
            <input type="month" required>

            <label>CVV</label>
            <input type="password" placeholder="123" required>

            <label>Billing Address</label>
            <input type="text" placeholder="Street address" required>

            <button type="submit" class="submit-button">
              Confirm Payment
            </button>

            <p style="margin-top:15px; font-size:0.85rem; color:#5e646b;">
              *This is a demo payment page. No real transactions are processed.
            </p>

          </form>

        </div>

      </main>

    </div>
  </div>
</body>
</html>
