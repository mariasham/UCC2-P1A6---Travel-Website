<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget Planner | Exploratour</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/script.js" defer></script>
</head>

<body>
  <div class="page-shell">
    <div class="site-card">

      <!-- HEADER -->
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">✦</span>
          <span class="brand-text">Exploratour</span>
        </div>

        <div class="topbar-right">
          <a href="../index.html" class="text-link">Home</a>
          <a href="destinations.html" class="text-link">Destinations</a>
          <a href="login.html" class="button-light">Login</a>
        </div>
      </header>

      <!-- PAGE CONTENT -->
      <main style="padding:120px 30px 60px; display:flex; justify-content:center;">

        <div class="form-card">

          <h1 class="page-title">Budget Planner</h1>

          <p class="page-copy">
            Get a rough idea of what your trip might cost. It doesn’t need to be perfect —
            just enough to help you plan realistically.
          </p>

          <form onsubmit="return calculateBudget()">

            <label for="destination">Destination</label>
            <input type="text" id="destination" placeholder="Where are you going?" required>

            <label for="days">Number of Days</label>
            <input type="number" id="days" min="1" value="5" required>

            <label for="daily">Estimated Daily Spend ($)</label>
            <input type="number" id="daily" min="0" value="150" required>

            <button type="submit" class="submit-button">Calculate</button>

          </form>

          <!-- RESULT -->
          <div id="budgetResult" style="margin-top:20px; text-align:center; font-weight:600;"></div>

        </div>

      </main>

    </div>
  </div>
</body>
</html>
