<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Exploratour</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="page-shell">
  <div class="hero-card">

    <header class="topbar">
      <div class="brand">Exploratour</div>

      <nav class="nav-links">
        <a href="../index.html">Home</a>
        <a href="about.html">About</a>
        <a href="destinations.html">Destinations</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
      </nav>
    </header>

    <main class="hero-content">
      <div class="form-card">
        <h1 class="page-title">Register</h1>
        <p class="page-copy">
          Create an account so you can start saving destinations, organizing ideas, and making your trip plans feel more put together.
        </p>

        <form action="success.html">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" name="fullname" required>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>

          <label for="traveldate">Preferred Travel Date</label>
          <input type="date" id="traveldate" name="traveldate" required>

          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="6">

          <button type="submit" class="submit-button">Register</button>
        </form>
      </div>
    </main>

  </div>
</div>

</body>
</html>
