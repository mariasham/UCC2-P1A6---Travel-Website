<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking - Exploratour</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="page-shell">
    <div class="hero-card">

        <header class="topbar">
            <div class="brand">Exploratour</div>

            <nav class="nav-links">
                <a href="../index.html">Home</a>
                <a href="destinations.html">Destinations</a>
                <a href="flights.html">Flights</a>
                <a href="hotels.html">Hotels</a>
                <a href="map.html">Map</a>
                <a href="videos.html">Videos</a>
                <a href="login.html">Login</a>
            </nav>
        </header>

        <main class="hero-content">

            <div class="content-card">

                <h1>Booking</h1>

                <p>
                    This is where everything starts coming together. You’ve explored, planned,
                    and now you’re ready to actually lock things in.
                </p>

                <h2>Booking Details</h2>

                <form action="success.html">

                    <label>Full Name</label>
                    <input type="text" placeholder="Your full name" required>

                    <label>Destination</label>
                    <input type="text" placeholder="Where are you going?" required>

                    <label>Travel Dates</label>
                    <input type="date" required>

                    <label>Number of Travelers</label>
                    <input type="number" min="1" value="1" required>

                    <label>Hotel Preference</label>
                    <input type="text" placeholder="Hotel or type of stay">

                    <button type="submit" class="submit-button">Confirm Booking</button>

                </form>

            </div>

        </main>

    </div>
</div>

</body>
</html>
